<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EASSY - Employee Administration Services System</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap');

    :root {
      --navy-900: #0c225a;
      --navy-700: #1f3f86;
      --orange-600: #eb5b1f;
      --orange-500: #ff7a2f;
      --white: #ffffff;
      --bg: #f6f8fc;
      --text: #132748;
      --muted: #516487;
      --line: rgba(15, 42, 109, 0.14);
      --shadow: 0 22px 46px rgba(12, 34, 90, 0.12);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      color: var(--text);
      min-height: 100vh;
      background:
        linear-gradient(115deg, rgba(12, 34, 90, 0.08) 0%, rgba(12, 34, 90, 0) 38%),
        linear-gradient(245deg, rgba(235, 91, 31, 0.09) 0%, rgba(235, 91, 31, 0) 42%),
        linear-gradient(180deg, #f4f7fc 0%, #eef3fb 100%);
      overflow-x: hidden;
      padding: 22px;
    }

    .bg-orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(55px);
      z-index: 0;
      pointer-events: none;
      opacity: 0.4;
      animation: float 15s ease-in-out infinite;
    }

    .orb-1 { width: 280px; height: 280px; background: rgba(235, 91, 31, 0.3); top: -70px; right: -40px; }
    .orb-2 { width: 220px; height: 220px; background: rgba(12, 34, 90, 0.24); left: -40px; bottom: 30px; animation-delay: -5s; }

    .page {
      position: relative;
      z-index: 1;
      max-width: 1240px;
      min-height: calc(100vh - 44px);
      margin: 0 auto;
      padding: 14px 26px 24px;
      border-radius: 26px;
      border: 1px solid rgba(15, 42, 109, 0.1);
      background: linear-gradient(160deg, rgba(255,255,255,0.96), rgba(247,250,255,0.9));
      box-shadow: 0 28px 54px rgba(12, 34, 90, 0.12), inset 0 1px 0 rgba(255, 255, 255, 0.75);
      display: flex;
      flex-direction: column;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border-radius: 14px;
      width: fit-content;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid var(--line);
    }

    .logo-mark { width: 56px; height: 56px; object-fit: contain; }

    .brand strong {
      font-family: 'Sora', sans-serif;
      font-size: 0.93rem;
      line-height: 1.15;
      color: var(--navy-900);
    }

    .hero {
      text-align: center;
      margin: 56px auto 0;
      width: 100%;
      position: relative;
      padding-top: 22px;
    }

    .hero::after {
      content: '';
      position: absolute;
      left: 50%;
      top: 0;
      transform: translateX(-50%);
      width: min(980px, 96%);
      height: 210px;
      /* background-image:
        linear-gradient(to bottom, rgba(12, 34, 90, 0.38), rgba(12, 34, 90, 0.22)),
        url("hr-team.png"); */
      background-size: cover;
      background-position: center 30%;
      border-radius: 22px;
      pointer-events: none;
      z-index: 0;
      opacity: 0.86;
      filter: saturate(0.9) contrast(1.03);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.14);
    }

    .hero h1 {
      font-family: 'Sora', sans-serif;
      font-size: clamp(1.7rem, 3vw, 2.6rem);
      color: var(--navy-900);
      letter-spacing: 0.25px;
      margin-bottom: 10px;
      animation: fadeDown 0.6s ease both;
      position: relative;
      z-index: 1;
    }

    .hero p {
      color: var(--muted);
      font-size: clamp(0.9rem, 1.4vw, 1.02rem);
      margin-bottom: 28px;
      animation: fadeDown 0.7s ease both;
      position: relative;
      z-index: 1;
    }

    .stats {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 18px;
      animation: fadeDown 0.8s ease both;
      position: relative;
      z-index: 1;
    }

    .stat {
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.75);
      color: var(--navy-700);
      font-size: 0.8rem;
      font-weight: 600;
    }

    .menu-grid {
      max-width: 1050px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
      text-align: left;
      position: relative;
      z-index: 1;
    }

    .menu-card {
      position: relative;
      text-decoration: none;
      color: inherit;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: linear-gradient(160deg, rgba(255,255,255,0.94), rgba(246,250,255,0.84));
      padding: 14px 14px 12px;
      min-height: 158px;
      display: grid;
      gap: 10px;
      box-shadow: 0 10px 22px rgba(12, 34, 90, 0.16);
      transform: translateY(16px);
      opacity: 0;
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
      overflow: hidden;
    }

    .menu-card.visible { transform: translateY(0); opacity: 1; }

    .menu-card:hover {
      transform: translateY(-5px);
      border-color: color-mix(in srgb, currentColor, transparent 58%);
      box-shadow: 0 16px 30px rgba(12, 34, 90, 0.14);
    }

    .menu-card::after {
      content: '';
      position: absolute;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      right: -30px;
      bottom: -50px;
      background: color-mix(in srgb, currentColor, transparent 88%);
      pointer-events: none;
    }

    .card-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .icon {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      background: color-mix(in srgb, currentColor, white 88%);
      display: grid;
      place-items: center;
      font-size: 0.85rem;
      font-weight: 800;
    }

    .status {
      font-size: 0.66rem;
      font-weight: 700;
      color: #fff;
      border-radius: 999px;
      padding: 4px 8px;
      background: var(--orange-600);
    }

    .status.blue { background: var(--navy-700); }

    .menu-card h3 {
      font-family: 'Sora', sans-serif;
      font-size: 1.02rem;
      line-height: 1.25;
    }

    .menu-card p {
      font-size: 0.83rem;
      color: var(--muted);
      line-height: 1.45;
    }

    .card-foot {
      margin-top: auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid rgba(15, 42, 109, 0.1);
      padding-top: 10px;
      font-size: 0.76rem;
      color: var(--muted);
      font-weight: 600;
    }

    .go { color: currentColor; font-weight: 700; }

    .c-orange { color: var(--orange-600); }
    .c-blue { color: #2062e3; }
    .c-green { color: #0d9a63; }
    .c-gold { color: #9b7a00; }
    .c-cyan { color: #0089ad; }
    .c-navy { color: var(--navy-900); }

    .tagline {
      margin-top: auto;
      align-self: flex-end;
      font-family: 'Sora', sans-serif;
      font-size: clamp(1.7rem, 4vw, 4rem);
      color: var(--navy-900);
      padding: 26px 8px 4px;
      text-shadow: 0 6px 12px rgba(12, 34, 90, 0.1);
    }

    .tagline span { color: var(--orange-600); }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes float {
      0%, 100% { transform: translate(0,0); }
      50% { transform: translate(18px,-10px); }
    }

    @media (max-width: 980px) {
      .menu-grid { grid-template-columns: 1fr; }
      .hero { margin-top: 42px; }
      .hero::after { width: min(980px, 98%); height: 190px; top: 0; }
    }

    @media (max-width: 640px) {
      body { padding: 12px; }
      .page { min-height: calc(100vh - 24px); padding: 10px 12px 16px; }
      .menu-grid { grid-template-columns: 1fr; }
      .hero { margin-top: 26px; }
      .hero::after { top: 0; height: 160px; opacity: 0.82; background-position: center 25%; }
      .tagline { align-self: center; font-size: 2.1rem; }
    }
  </style>
</head>
<body>
  <div class="bg-orb orb-1" aria-hidden="true"></div>
  <div class="bg-orb orb-2" aria-hidden="true"></div>

  <main class="page">
    <div class="brand" aria-label="Logo perusahaan">
      <img class="logo-mark" src="BRC-3.png" alt="Logo BRC" />
      <strong>BRC<br />EASSY Portal</strong>
    </div>

    <section class="hero" aria-label="Menu utama EASSY">
      <h1>EASSY</h1>
      <p>Employee Administration Services System</p>

     
      <div class="menu-grid">
        <a class="menu-card c-orange" href="https://hr-overtime.brcoleo.id"><div class="card-head"><span class="icon">OV</span></div><h3>Overtime</h3><p>Kelola pengajuan lembur karyawan secara digital.</p><div class="card-foot"><span>C&B</span><span class="go">Open</span></div></a>
        <a class="menu-card c-blue" href="https://tripclear.brcoleo.id"><div class="card-head"><span class="icon">TC</span></div><h3>Trip Clear</h3><p>Kelola pengajuan perjalanan dinas secara digital.</p><div class="card-foot"><span>Human Resource</span><span class="go">Open</span></div></a>
      </div>
    </section>

    <div class="tagline">#MakeIt<span>CLEAR</span></div>
  </main>

  <script>
    const cards = document.querySelectorAll('.menu-card');
    const observer = new IntersectionObserver((entries) => {
      entries.forEach((entry, index) => {
        if (entry.isIntersecting) {
          setTimeout(() => entry.target.classList.add('visible'), index * 70);
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.15 });

    cards.forEach((card) => observer.observe(card));
  </script>
</body>
</html>
